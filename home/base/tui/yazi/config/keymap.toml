[mgr]

keymap = [
	{ on = "<Esc>", run = "escape",             desc = "退出可视化模式、清除选中或取消搜索" },
	{ on = "<C-[>", run = "escape",             desc = "退出可视化模式、清除选中或取消搜索" },
	{ on = "q",     run = "quit",               desc = "退出进程" },
	{ on = "Q",     run = "quit --no-cwd-file", desc = "退出（不输出当前工作目录）" },
	{ on = "<C-c>", run = "close",              desc = "关闭当前标签页，若为最后一个则退出" },
	{ on = "<C-z>", run = "suspend",            desc = "挂起进程（后台运行）" },

	# 跳转 (Hopping)
	{ on = "k", run = "arrow prev", desc = "上一个文件" },
	{ on = "j", run = "arrow next", desc = "下一个文件" },

	{ on = "<Up>",   run = "arrow prev", desc = "上一个文件" },
	{ on = "<Down>", run = "arrow next", desc = "下一个文件" },

	{ on = "<C-u>", run = "arrow -50%",  desc = "向上翻半页" },
	{ on = "<C-d>", run = "arrow 50%",   desc = "向下翻半页" },
	{ on = "<C-b>", run = "arrow -100%", desc = "向上翻整页" },
	{ on = "<C-f>", run = "arrow 100%",  desc = "向下翻整页" },

	{ on = "<S-PageUp>",   run = "arrow -50%",  desc = "向上翻半页" },
	{ on = "<S-PageDown>", run = "arrow 50%",   desc = "向下翻半页" },
	{ on = "<PageUp>",     run = "arrow -100%", desc = "向上翻整页" },
	{ on = "<PageDown>",   run = "arrow 100%",  desc = "向下翻整页" },

	{ on = [ "g", "g" ], run = "arrow top", desc = "跳至顶部" },
	{ on = "G",          run = "arrow bot", desc = "跳至底部" },

	# 导航 (Navigation)
	{ on = "h", run = "leave", desc = "返回上级目录" },
	{ on = "l", run = "enter", desc = "进入子目录" },

	{ on = "<Left>",  run = "leave", desc = "返回上级目录" },
	{ on = "<Right>", run = "enter", desc = "进入子目录" },

	{ on = "H", run = "back",    desc = "回退到上一个历史路径" },
	{ on = "L", run = "forward", desc = "前进到下一个历史路径" },

	# 选中 (Toggle)
	{ on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "反选当前文件并下移" },
	{ on = "<S-a>",   run = "toggle_all --state=on", desc = "全选" },
	{ on = "<C-r>",   run = "toggle_all",            desc = "反选全部" },

	# 可视化模式 (Visual mode)
	{ on = "v", run = "visual_mode",         desc = "进入可视化模式（选择模式）" },
	{ on = "V", run = "visual_mode --unset", desc = "进入可视化模式（反选模式）" },

	# 预览滚动 (Seeking)
	{ on = "K", run = "seek -5", desc = "预览向上滚动 5 行" },
	{ on = "J", run = "seek 5",  desc = "预览向下滚动 5 行" },

	# 查看详情 (Spotting)
	{ on = "<Tab>", run = "spot", desc = "查看当前文件详情" },

	# 文件操作 (Operation)
	{ on = "o",         run = "open",                        desc = "使用默认程序打开" },
	{ on = "O",         run = "open --interactive",          desc = "交互式选择打开方式" },
	{ on = "<Enter>",   run = "open",                        desc = "使用默认程序打开" },
	{ on = "<S-Enter>", run = "open --interactive",          desc = "交互式选择打开方式" },
	{ on = "y",         run = "yank",                        desc = "复制所选文件 (Yank)" },
	{ on = "x",         run = "yank --cut",                  desc = "剪切所选文件 (Cut)" },
	{ on = "p",         run = "paste",                       desc = "粘贴文件" },
	{ on = "P",         run = "paste --force",               desc = "强制粘贴（覆盖同名文件）" },
	{ on = "-",         run = "link",                        desc = "创建绝对路径软链接" },
	{ on = "_",         run = "link --relative",             desc = "创建相对路径软链接" },
	{ on = "<C-->",     run = "hardlink",                    desc = "创建硬链接" },
	{ on = "Y",         run = "unyank",                      desc = "取消复制/剪切状态" },
	{ on = "X",         run = "unyank",                      desc = "取消复制/剪切状态" },
	{ on = "d",         run = "remove",                      desc = "移至回收站" },
	{ on = "D",         run = "remove --permanently",        desc = "永久删除" },
	{ on = "a",         run = "create",                      desc = "创建文件（以 / 结尾创建目录）" },
	{ on = "r",         run = "rename --cursor=before_ext",  desc = "重命名" },
	{ on = ";",         run = "shell --interactive",         desc = "执行交互式 Shell 命令" },
	{ on = ":",         run = "shell --block --interactive", desc = "执行交互式命令（阻塞直到完成）" },
	{ on = ".",         run = "hidden toggle",               desc = "切换隐藏文件显示" },
	{ on = "s",         run = "search --via=fd",             desc = "通过 fd 搜索文件名" },
	{ on = "S",         run = "search --via=rg",             desc = "通过 ripgrep 搜索内容" },
	{ on = "<C-s>",     run = "escape --search",             desc = "取消进行中的搜索" },
	{ on = "z",         run = "plugin fzf",                  desc = "通过 fzf 跳转文件/目录" },
	{ on = "Z",         run = "plugin zoxide",               desc = "通过 zoxide 跳转目录" },

	# 行模式 (Linemode)
	{ on = [ "m", "s" ], run = "linemode size",        desc = "行显示模式：大小" },
	{ on = [ "m", "p" ], run = "linemode permissions", desc = "行显示模式：权限" },
	{ on = [ "m", "b" ], run = "linemode btime",       desc = "行显示模式：创建时间" },
	{ on = [ "m", "m" ], run = "linemode mtime",       desc = "行显示模式：修改时间" },
	{ on = [ "m", "o" ], run = "linemode owner",       desc = "行显示模式：所有者" },
	{ on = [ "m", "n" ], run = "linemode none",        desc = "行显示模式：无" },

	# 复制元数据 (Copy)
	{ on = [ "c", "c" ], run = "copy path",             desc = "复制绝对路径" },
	{ on = [ "c", "d" ], run = "copy dirname",          desc = "复制所在目录路径" },
	{ on = [ "c", "f" ], run = "copy filename",         desc = "复制文件名" },
	{ on = [ "c", "n" ], run = "copy name_without_ext", desc = "复制文件名（不含扩展名）" },

	# 筛选 (Filter)
	{ on = "f", run = "filter --smart", desc = "增量筛选文件" },

	# 查找 (Find)
	{ on = "/", run = "find --smart",            desc = "向下查找" },
	{ on = "?", run = "find --previous --smart", desc = "向上查找" },
	{ on = "n", run = "find_arrow",              desc = "跳转到下一个匹配项" },
	{ on = "N", run = "find_arrow --previous",   desc = "跳转到上一个匹配项" },

	# 排序 (Sorting)
	{ on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ],  desc = "按修改时间排序" },
	{ on = [ ",", "M" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "按修改时间排序（降序）" },
	{ on = [ ",", "b" ], run = [ "sort btime --reverse=no", "linemode btime" ],  desc = "按创建时间排序" },
	{ on = [ ",", "B" ], run = [ "sort btime --reverse=yes", "linemode btime" ], desc = "按创建时间排序（降序）" },
	{ on = [ ",", "e" ], run = "sort extension --reverse=no",                    desc = "按扩展名排序" },
	{ on = [ ",", "E" ], run = "sort extension --reverse=yes",                   desc = "按扩展名排序（降序）" },
	{ on = [ ",", "a" ], run = "sort alphabetical --reverse=no",                 desc = "按字母顺序排序" },
	{ on = [ ",", "A" ], run = "sort alphabetical --reverse=yes",                desc = "按字母顺序排序（降序）" },
	{ on = [ ",", "n" ], run = "sort natural --reverse=no",                      desc = "按自然数顺序排序" },
	{ on = [ ",", "N" ], run = "sort natural --reverse=yes",                     desc = "按自然数顺序排序（降序）" },
	{ on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ],    desc = "按文件大小排序" },
	{ on = [ ",", "S" ], run = [ "sort size --reverse=yes", "linemode size" ],   desc = "按文件大小排序（降序）" },
	{ on = [ ",", "r" ], run = "sort random --reverse=no",                       desc = "随机排序" },

	# 快速跳转 (Goto)
	{ on = [ "g", "h" ],       run = "cd ~",                        desc = "跳转到用户目录 (Home)" },
	{ on = [ "g", "g" ],       run = "cd ~/.myutils/dotfiles",      desc = "跳转到 ~/.myutils/dotfiles" },
	{ on = [ "g", "d" ],       run = "cd ~/Downloads",              desc = "跳转到下载目录" },
	{ on = [ "g", "<Space>" ], run = "cd --interactive",            desc = "交互式跳转" },
	{ on = [ "g", "f" ],       run = "follow",                      desc = "跳转到软链接所指原路径" },
  { on = [ "g", "c" ],       run = "cd ~/Documents/code",         desc = "跳转到code目录"},
  { on = [ "g", "p" ],       run = "cd ~/Documents/code/python",  desc = "跳转到python项目目录"},


	# 标签页 (Tabs)
	{ on = "t", run = "tab_create --current", desc = "在当前路径新建标签页" },

	{ on = "1", run = "tab_switch 0", desc = "切换到第 1 个标签页" },
	{ on = "2", run = "tab_switch 1", desc = "切换到第 2 个标签页" },
	{ on = "3", run = "tab_switch 2", desc = "切换到第 3 个标签页" },
	{ on = "4", run = "tab_switch 3", desc = "切换到第 4 个标签页" },
	{ on = "5", run = "tab_switch 4", desc = "切换到第 5 个标签页" },
	{ on = "6", run = "tab_switch 5", desc = "切换到第 6 个标签页" },
	{ on = "7", run = "tab_switch 6", desc = "切换到第 7 个标签页" },
	{ on = "8", run = "tab_switch 7", desc = "切换到第 8 个标签页" },
	{ on = "9", run = "tab_switch 8", desc = "切换到第 9 个标签页" },

	{ on = "[", run = "tab_switch -1 --relative", desc = "切换到上一个标签页" },
	{ on = "]", run = "tab_switch 1 --relative",  desc = "切换到下一个标签页" },

	{ on = "{", run = "tab_swap -1", desc = "将当前标签页左移" },
	{ on = "}", run = "tab_swap 1",  desc = "将当前标签页右移" },

	# 任务 (Tasks)
	{ on = "w", run = "tasks:show", desc = "打开任务管理器" },

	# 帮助 (Help)
	{ on = "~",    run = "help", desc = "打开帮助菜单" },
	{ on = "<F1>", run = "help", desc = "打开帮助菜单" },
]

