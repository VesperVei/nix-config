	{ on = "<Esc>",   run = "close",          desc = "取消选择" },
	{ on = "<C-[>",   run = "close",          desc = "取消选择" },
	{ on = "<C-c>",   run = "close",          desc = "取消选择" },
	{ on = "<Enter>", run = "close --submit", desc = "提交选择" },

	{ on = "k", run = "arrow prev", desc = "上一个选项" },
	{ on = "j", run = "arrow next", desc = "下一个选项" },

	{ on = "<Up>",   run = "arrow prev", desc = "上一个选项" },
	{ on = "<Down>", run = "arrow next", desc = "下一个选项" },

	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]

[input]

keymap = [
	{ on = "<C-c>",   run = "close",          desc = "取消输入" },
	{ on = "<Enter>", run = "close --submit", desc = "提交输入" },
	{ on = "<Esc>",   run = "escape",         desc = "返回普通模式或取消输入" },
	{ on = "<C-[>",   run = "escape",         desc = "返回普通模式或取消输入" },

	# 模式切换
	{ on = "i", run = "insert",                          desc = "进入插入模式 (Insert)" },
	{ on = "I", run = [ "move first-char", "insert" ],   desc = "跳至首个非空字符并插入" },
	{ on = "a", run = "insert --append",                 desc = "进入追加模式 (Append)" },
	{ on = "A", run = [ "move eol", "insert --append" ], desc = "跳至行尾并追加" },
	{ on = "v", run = "visual",                          desc = "进入可视化模式（选区）" },
	{ on = "r", run = "replace",                         desc = "替换单个字符" },

	# 快速选择
	{ on = "V",     run = [ "move bol", "visual", "move eol" ], desc = "选中整行" },
	{ on = "<C-A>", run = [ "move eol", "visual", "move bol" ], desc = "从行尾选中到行首" },
	{ on = "<C-E>", run = [ "move bol", "visual", "move eol" ], desc = "从行首选中到行尾" },

	# 字符级移动
	{ on = "h",       run = "move -1", desc = "向左移动一个字符" },
	{ on = "l",       run = "move 1",  desc = "向右移动一个字符" },
	{ on = "<Left>",  run = "move -1", desc = "向左移动一个字符" },
	{ on = "<Right>", run = "move 1",  desc = "向右移动一个字符" },
	{ on = "<C-b>",   run = "move -1", desc = "向左移动一个字符" },
	{ on = "<C-f>",   run = "move 1",  desc = "向右移动一个字符" },

	# 单词级移动
	{ on = "b",         run = "backward",                    desc = "跳至当前或上一个单词词首" },
	{ on = "B",         run = "backward --far",              desc = "跳至当前或上一个大单词 (WORD) 词首" },
	{ on = "w",         run = "forward",                     desc = "跳至下一个单词词首" },
	{ on = "W",         run = "forward --far",               desc = "跳至下一个大单词 (WORD) 词首" },
	{ on = "e",         run = "forward --end-of-word",       desc = "跳至当前或下一个单词词尾" },
	{ on = "E",         run = "forward --far --end-of-word", desc = "跳至当前或下一个大单词 (WORD) 词尾" },
	{ on = "<A-b>",     run = "backward",                    desc = "向后跳一个单词" },
	{ on = "<A-f>",     run = "forward --end-of-word",       desc = "向前跳一个单词词尾" },
	{ on = "<C-Left>",  run = "backward",                    desc = "向后跳一个单词" },
	{ on = "<C-Right>", run = "forward --end-of-word",       desc = "向前跳一个单词词尾" },

	# 行内快速定位
	{ on = "0",      run = "move bol",        desc = "跳至行首" },
	{ on = "$",      run = "move eol",        desc = "跳至行尾" },
	{ on = "_",      run = "move first-char", desc = "跳至第一个非空字符" },
	{ on = "^",      run = "move first-char", desc = "跳至第一个非空字符" },
	{ on = "<C-a>",  run = "move bol",        desc = "跳至行首" },
	{ on = "<C-e>",  run = "move eol",        desc = "跳至行尾" },
	{ on = "<Home>", run = "move bol",        desc = "跳至行首" },
	{ on = "<End>",  run = "move eol",        desc = "跳至行尾" },

	# 删除
	{ on = "<Backspace>", run = "backspace",         desc = "删除光标前一个字符" },
	{ on = "<Delete>",    run = "backspace --under", desc = "删除光标下的字符" },
	{ on = "<C-h>",       run = "backspace",         desc = "删除光标前一个字符" },
	{ on = "<C-d>",       run = "backspace --under", desc = "删除光标下的字符" },

	# 快速剪切 (Kill)
	{ on = "<C-u>",         run = "kill bol",      desc = "从光标处删至行首" },
	{ on = "<C-k>",         run = "kill eol",      desc = "从光标处删至行尾" },
	{ on = "<C-w>",         run = "kill backward", desc = "向前删除一个单词" },
	{ on = "<A-d>",         run = "kill forward",  desc = "向后删除一个单词" },
	{ on = "<C-Backspace>", run = "kill backward", desc = "向前删除一个单词" },
	{ on = "<C-Delete>",    run = "kill forward",  desc = "向后删除一个单词" },

	# 剪切/复制/粘贴
	{ on = "d", run = "delete --cut",                                      desc = "剪切所选字符" },
	{ on = "D", run = [ "delete --cut", "move eol" ],                      desc = "剪切至行尾" },
	{ on = "c", run = "delete --cut --insert",                             desc = "剪切并进入插入模式" },
	{ on = "C", run = [ "delete --cut --insert", "move eol" ],             desc = "剪切至行尾并进入插入模式" },
	{ on = "s", run = [ "delete --cut --insert", "move 1" ],               desc = "替换当前字符并进入插入模式" },
	{ on = "S", run = [ "move bol", "delete --cut --insert", "move eol" ], desc = "替换整行内容" },
	{ on = "x", run = [ "delete --cut", "move 1 --in-operating" ],         desc = "剪切当前字符" },
	{ on = "y", run = "yank",                                              desc = "复制所选字符" },
	{ on = "p", run = "paste",                                             desc = "粘贴到光标后" },
	{ on = "P", run = "paste --before",                                    desc = "粘贴到光标前" },

	# 撤销/重做/大小写
	{ on = "u",     run = [ "undo", "casefy lower" ], desc = "撤销（可视化模式下转小写）" },
	{ on = "U",     run = "casefy upper",             desc = "转大写" },
	{ on = "<C-r>", run = "redo",                     desc = "重做" },

	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]

