[cmp]

keymap = [
	{ on = "<C-c>",   run = "close",                                      desc = "取消补全" },
	{ on = "<Tab>",   run = "close --submit",                             desc = "提交补全" },
	{ on = "<Enter>", run = [ "close --submit", "input:close --submit" ], desc = "提交补全并执行输入" },

	{ on = "<A-k>", run = "arrow prev", desc = "上一个建议项" },
	{ on = "<A-j>", run = "arrow next", desc = "下一个建议项" },

	{ on = "<Up>",   run = "arrow prev", desc = "上一个建议项" },
	{ on = "<Down>", run = "arrow next", desc = "下一个建议项" },

	{ on = "<C-p>", run = "arrow prev", desc = "上一个建议项" },
	{ on = "<C-n>", run = "arrow next", desc = "下一个建议项" },

	# 帮助
	{ on = "~",    run = "help", desc = "打开帮助" },
	{ on = "<F1>", run = "help", desc = "打开帮助" },
]

[help]

keymap = [
	{ on = "<Esc>", run = "escape", desc = "清除筛选或关闭帮助" },
	{ on = "<C-[>", run = "escape", desc = "清除筛选或关闭帮助" },
	{ on = "<C-c>", run = "close",  desc = "关闭帮助" },

	# 导航
	{ on = "k", run = "arrow prev", desc = "上一行" },
	{ on = "j", run = "arrow next", desc = "下一行" },

	{ on = "<Up>",   run = "arrow prev", desc = "上一行" },
	{ on = "<Down>", run = "arrow next", desc = "下一行" },

	# 筛选
	{ on = "f", run = "filter", desc = "搜索快捷键说明" },
]
