# --- 基础显示优化 ---
# 建议改为 tmux-256color 以获得更好的真彩色支持（配合你的 Tokyonight 主题）
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# 窗口与窗格分屏优化
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# 快速重启配置
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded..."

# 窗格缩放与调整 (保持你的习惯)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

set -g mouse on
set-window-option -g mode-keys vi

# 复制模式优化 (保持你的习惯)
bind-key -T copy-mode-vi 'v' send -X begin-selection 
bind-key -T copy-mode-vi 'y' send -X copy-selection 
unbind -T copy-mode-vi MouseDragEnd1Pane 

# --- 核心视觉重构：透明气泡状态栏 ---
# 1. 基础颜色定义 (同步你的 Nvim 配色)
# violet: #FF61EF, blue: #65D1FF, green: #3EFFDC, bg: NONE
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default" # 【关键】透明背景

# 2. 左侧：Session 状态 (紫色圆角气泡)
set -g status-left-length 20
set -g status-left "#[fg=#FF61EF,bg=default]#[fg=#011628,bg=#FF61EF,bold] 󰭗 #S #[fg=#FF61EF,bg=default] "

# 3. 中间：窗口列表样式 (青绿色/浅蓝色)
set -g window-status-format "#[fg=#65D1FF,bg=default] #I:#W "
set -g window-status-current-format "#[fg=#3EFFDC,bg=default]#[fg=#011628,bg=#3EFFDC,bold] #I:#W #[fg=#3EFFDC,bg=default]"

# 4. 右侧：身份与时间 (蓝色/黄色气泡)
set -g status-right-length 60
set -g status-right "#[fg=#65D1FF,bg=default]#[fg=#011628,bg=#65D1FF,bold] 󰣇 Chenhun #[fg=#65D1FF,bg=default] #[fg=#FFDA7B,bg=default]#[fg=#011628,bg=#FFDA7B,bold] %H:%M #[fg=#FFDA7B,bg=default]"

# --- 插件管理 (移除冗余皮肤，保留核心功能) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ssh 里再套一层 tmux 时，打开这个开关只透传 Ctrl+h/j/k/l 和滚轮给远端 tmux。
set -g @nested_tmux_passthrough off

# 自动保存与恢复
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# 确保 tpm 正常运行
run '~/.config/tmux/plugins/tpm/tpm'
# 允许 Tmux 接收内层程序的剪贴板请求，并将其转发给外层的终端 (Kitty)
set -s set-clipboard on

# --- Ctrl+h/j/k/l 智能导航 ---
# 本地 shell：直接切换 tmux pane。
# 本地 nvim：把按键交给 vim-tmux-navigator，由 nvim split / tmux pane 无缝跳转。
# ssh 远端：默认由外层 tmux 处理；开启透传后把 Ctrl+h/j/k/l 交给远端 tmux。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(.*/)?(g?\\.?(view|l?n?vim?x?)(diff)?|fzf)(diff)?$'"
is_ssh="case '#{pane_current_command}' in ssh|mosh|mosh-client) exit 0 ;; *) exit 1 ;; esac"
is_nested_tmux_passthrough="case '#{pane_current_command}:#{@nested_tmux_passthrough}' in ssh:on|mosh:on|mosh-client:on) exit 0 ;; *) exit 1 ;; esac"

bind-key -n C-h if-shell "$is_vim || $is_nested_tmux_passthrough" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim || $is_nested_tmux_passthrough" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim || $is_nested_tmux_passthrough" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim || $is_nested_tmux_passthrough" "send-keys C-l" "select-pane -R"

# prefix + g：切换 ssh 里嵌套 tmux 的透传模式
bind-key g run-shell -b '$HOME/.config/tmux/scripts/toggle-nested-tmux-passthrough.sh #{pane_id}'

# ssh 远端默认不透传鼠标；仅开启透传后把滚轮交给远端 tmux。
# 这样 ssh pane 中不会把 0;44;25M 这类鼠标协议打印到远端 shell。
unbind-key -n MouseDown1Pane
unbind-key -n MouseUp1Pane
unbind-key -n MouseDrag1Pane
unbind-key -n MouseDown2Pane
unbind-key -n MouseDown3Pane
unbind-key -n WheelUpPane
unbind-key -n WheelDownPane
bind-key -n MouseDown1Pane if-shell "$is_ssh" "select-pane -t =" "select-pane -t = \; send-keys -M"
bind-key -n MouseUp1Pane if-shell "$is_ssh" "select-pane -t =" "send-keys -M"
bind-key -n MouseDrag1Pane if-shell "$is_ssh" "copy-mode -M" "if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -M'"
bind-key -n MouseDown2Pane if-shell "$is_ssh" "paste-buffer -p" "select-pane -t = \; if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'paste-buffer -p'"
bind-key -n MouseDown3Pane if-shell "$is_ssh" "display-menu -t = -x M -y M 'Horizontal Split' h 'split-window -h' 'Vertical Split' v 'split-window -v' '' 'Kill' X 'kill-pane' 'Zoom' z 'resize-pane -Z'" "display-menu -t = -x M -y M 'Horizontal Split' h 'split-window -h' 'Vertical Split' v 'split-window -v' '' 'Kill' X 'kill-pane' 'Zoom' z 'resize-pane -Z'"
bind-key -n WheelUpPane if-shell "$is_nested_tmux_passthrough" "send-keys -M" "if-shell \"$is_ssh\" \"copy-mode -e\" \"if-shell -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' 'send-keys -M' 'copy-mode -e'\""
bind-key -n WheelDownPane if-shell "$is_nested_tmux_passthrough" "send-keys -M" "if-shell \"$is_ssh\" \"copy-mode -e \\; send-keys -X -N 5 scroll-down\" \"if-shell -F '#{pane_in_mode}' 'send-keys -X -N 5 scroll-down' 'send-keys -M'\""
